<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tokoku</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#8b5cf6">
    <!-- Memanggil Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* MENGAMBIL ALIH SIFAT BAWAAN TABEL MENJADI GRID CARD */
        
        #tabel-barang {
            display: grid !important; /* Memaksa tbody menjadi grid */
            align-items: stretch;
            width: 100%;
        }
        
        /* Mengubah elemen TR (baris tabel) menjadi bentuk Card Flexbox */
        #tabel-barang tr {
            display: flex !important; 
            flex-direction: column;
            background-color: white;
            border-radius: 0.5rem;
            border: 1px solid #e2e8f0 !important;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
            cursor: pointer;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            padding: 0 !important;
            text-align: left !important;
        }
        
        #tabel-barang tr:hover {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }
        
        /* Mengubah TD (sel tabel) menjadi block agar menyusun ke bawah di dalam card */
        #tabel-barang td {
            display: block !important;
            border: none !important;
            padding: 0;
            width: 100%;
        }

        /* Membuat area gambar produk abstrak (Placeholder) menggunakan trik ::before */
        #tabel-barang tr::before {
            content: '';
            display: block;
            width: 100%;
            padding-bottom: 100%; /* aspek rasio 1:1 bentuk persegi */
            background-color: #f8fafc;
            /* Ikon gambar SVG */
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="%23cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: center;
            background-size: 25%;
            border-bottom: 1px solid #f1f5f9;
        }

        /* td ke-1: Kolom ID (Disamarkan menjadi teks kecil abu-abu di dalam card) */
        #tabel-barang td:nth-child(1) {
            font-size: 0.65rem;
            color: #94a3b8; 
            padding: 0.75rem 0.75rem 0 0.75rem;
            font-weight: 500;
        }
        /* Tambahkan prefix 'ID:' */
        /* #tabel-barang td:nth-child(1)::before {
            content: 'ID. ';
        } */

        /* td ke-2: Kolom Nama Produk */
        #tabel-barang td:nth-child(1) {
            font-size: 0.875rem; /* ~14px */
            color: #334155; 
            line-height: 1.25rem;
            padding: 0.25rem 0.75rem;
            flex-grow: 1; /* mendorong elemen di bawahnya agar sejajar rata bawah */
            
            /* efek line-clamp (maks 2 baris teks, sisa dipotong titik-titik) */
            display: -webkit-box !important;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* td ke-3: Kolom Harga */
        #tabel-barang td:nth-child(2) {
            font-size: 1rem; /* ~16px */
            font-weight: 700;
            color: #0f172a; 
            padding: 0.5rem 0.75rem 0.75rem 0.75rem;
        }
        
        /* Tambahkan teks fiktif rating di dalam card supaya lebig elegan */
        #tabel-barang td:nth-child(2)::after {
            content: '📍 Kota Singkawang · ⭐ 4.9';
            display: block;
            font-weight: 400;
            font-size: 0.65rem;
            color: #64748b;
            margin-top: 0.35rem;
        }
    </style>
</head>
<body class="bg-gray-50 font-sans min-h-screen">
    <!-- Navbar Ala Tokopedia -->
    <nav class="bg-white sticky top-0 z-50 shadow-sm border-b border-gray-100">
        <div class="container mx-auto px-4 py-3 flex items-center gap-6">
            <a href="#" class="text-emerald-500 text-2xl font-bold tracking-tight">tokoku</a>
            <div class="text-sm text-gray-600 hidden md:block cursor-pointer hover:bg-gray-100 px-2 py-1 rounded">Kategori</div>
            <div class="flex-grow flex relative">
                <input type="text" placeholder="Cari di Tokoku..." class="w-full border border-gray-300 rounded-lg py-2 px-4 focus:outline-none focus:ring-1 focus:ring-emerald-500 focus:border-emerald-500 text-sm">
                <button class="absolute right-0 bg-gray-50 hover:bg-gray-100 text-gray-500 px-4 h-full rounded-r-lg border border-gray-300 border-l-0">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <div class="flex items-center gap-4 text-gray-500 text-lg">
                <div class="cursor-pointer hover:text-emerald-500 relative">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <div class="h-6 border-r border-gray-300 hidden md:block"></div>
                <button class="text-sm font-semibold border border-emerald-500 text-emerald-500 px-4 py-1.5 rounded-lg hover:bg-emerald-50 transition hidden md:block">Masuk</button>
                <button class="text-sm font-semibold bg-emerald-500 text-white px-4 py-1.5 rounded-lg hover:bg-emerald-600 transition hidden md:block">Daftar</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-6 max-w-7xl">
        <div class="mb-5 flex items-center gap-2">
            <h1 class="text-xl font-bold text-gray-800">Rekomendasi Untukmu</h1>
        </div>

        <!-- Form Tambah Barang -->
<div class="bg-white p-5 shadow-sm border border-gray-200 rounded-xl mb-8">
    <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="text-emerald-500"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
        Tambah Barang Baru
    </h2>
    
    <form id="form-tambah" class="flex flex-col md:flex-row gap-4">
        <div class="flex-1">
            <label class="block text-xs text-gray-500 font-bold uppercase mb-1">Nama Barang</label>
            <input type="text" id="input-nama" class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500" placeholder="Misal: Mouse Wireless" required>
        </div>
        <div class="flex-1">
            <label class="block text-xs text-gray-500 font-bold uppercase mb-1">Harga (Rp)</label>
            <input type="number" id="input-harga" class="w-full border border-gray-300 p-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-amber-500" placeholder="Misal: 150000" required>
        </div>
        <div class="flex flex-col justify-end">
            <button type="submit" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-2 px-6 rounded-lg transition-colors h-[42px]">
                Simpan
            </button>
        </div>
    </form>
</div>
        
        <!-- Grid Wrapper -->
        <!-- Walaupun kita menggunakan TABLE tag, CSS akan mengubahnya secara total -->
        <table class="w-full block">
            <!-- Grid dengan Tailwind: Menyesuaikan jumlah card per baris sesuai ukuran layar -->
            <tbody id="tabel-barang" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4 w-full">
                <!-- Data akan diload secara otomatis dari script.js sebagai TR dan TD -->
            </tbody>
        </table>
    </main>

    <!-- Memanggil file logika JS -->
    <script src="script.js"></script>
</body>
</html>
